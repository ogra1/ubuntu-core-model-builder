name: ubuntu-core-model-builder
title: Ubuntu Core Model Builder
version: '0.1.5'
summary: GUI for creating and signing Ubuntu Core model assertions
description: |
  A graphical tool to create, edit, and sign Ubuntu Core model
  assertions. Searches the snap store, resolves snap IDs automatically,
  manages signing keys, and integrates with snapcraft.

confinement: classic
grade: stable
base: core24

platforms:
  amd64:
  arm64:

apps:
  ubuntu-core-model-builder:
    command: bin/ubuntu_core_model_builder
    environment:
      PATH: $SNAP/bin:$SNAP/usr/bin:$PATH
      LD_LIBRARY_PATH: $SNAP/bin/lib:$SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR:$LD_LIBRARY_PATH
      GDK_BACKEND: x11
      GTK_PATH: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/gtk-3.0
      GIO_MODULE_DIR: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/gio/modules

parts:
  model-builder:
    plugin: flutter
    source: .
    flutter-target: lib/main.dart
    build-packages:
      - clang
      - cmake
      - ninja-build
      - pkg-config
      - libgtk-3-dev
    stage-packages:
      - libegl1
      - libgles2
      - libglvnd0
      - libdrm2
      - libgbm1
      - libgtk-3-0
      - libglib2.0-0
      - libgdk-pixbuf-2.0-0
      - libpango-1.0-0
      - libpangocairo-1.0-0
      - libcairo2
      - libcairo-gobject2
      - libharfbuzz0b
      - libatk1.0-0
      - libatk-bridge2.0-0
      - libepoxy0
      - libfontconfig1
      - libfreetype6
      - libx11-6
      - libxcomposite1
      - libxcursor1
      - libxdamage1
      - libxext6
      - libxfixes3
      - libxi6
      - libxinerama1
      - libxrandr2
      - libxrender1
      - librsvg2-common
      - libgdk-pixbuf2.0-bin
    override-build: |
      craftctl default
      set -eux
      # Locate the built Flutter Linux bundle within the part.
      # The bundle contains the executable + lib/ + data/ subdirs.
      bundle="$(find "$CRAFT_PART_BUILD" -type d \
        -path '*/build/linux/*/release/bundle' | head -n1)"
      if [ -z "$bundle" ]; then
        echo "ERROR: could not find Flutter release bundle" >&2
        find "$CRAFT_PART_BUILD" -name 'ubuntu_core_model_builder' -type f >&2 || true
        exit 1
      fi
      echo "Found bundle: $bundle"
      mkdir -p "$CRAFT_PART_INSTALL/bin"
      cp -r "$bundle"/* "$CRAFT_PART_INSTALL/bin/"
      # Sanity: the executable should now exist.
      test -f "$CRAFT_PART_INSTALL/bin/ubuntu_core_model_builder"
