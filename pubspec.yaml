name: ubuntu_core_model_builder
description: GUI for creating and signing Ubuntu Core model assertions.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  yaru: ^10.2.0
  yaru_icons: ^2.2.0
  http: ^1.1.0
  process_run: ^1.3.4+1
  path_provider: ^2.1.1
  file_selector: ^1.0.3
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
